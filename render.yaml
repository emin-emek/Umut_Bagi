services:
  - type: web
    name: umut-bagi
    runtime: python
    buildCommand: pip install -r requirements.txt && python build.py
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: umut-bagi-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: umut-bagi-db
    databaseName: umut_bagi
    user: umut_bagi_user
    plan: free
